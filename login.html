<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập / Đăng ký - Nhật ký</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container" style="max-width: 450px;">
    <div class="logo" style="text-align:center; margin-bottom:1rem;">📔 Nhật ký</div>
    <div class="auth-tabs">
        <button id="loginTab" class="tab-btn active">Đăng nhập</button>
        <button id="registerTab" class="tab-btn">Đăng ký</button>
    </div>
    <form id="loginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="loginPassword" required>
        </div>
        <button type="submit">Đăng nhập</button>
        <div id="loginMsg" class="message"></div>
    </form>
    <form id="registerForm" style="display:none;">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" required>
        </div>
        <div class="form-group">
            <label>Mật khẩu (tối thiểu 6 ký tự)</label>
            <input type="password" id="regPassword" required>
        </div>
        <button type="submit">Tạo tài khoản</button>
        <div id="regMsg" class="message"></div>
    </form>
</div>
<script type="module">
    import { login, register } from "./js/auth.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { auth } from "./js/firebase-config.js";

    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");
    const loginMsg = document.getElementById("loginMsg");
    const regMsg = document.getElementById("regMsg");

    loginTab.onclick = () => {
        loginForm.style.display = "block";
        registerForm.style.display = "none";
        loginTab.classList.add("active");
        registerTab.classList.remove("active");
    };
    registerTab.onclick = () => {
        registerForm.style.display = "block";
        loginForm.style.display = "none";
        registerTab.classList.add("active");
        loginTab.classList.remove("active");
    };
    loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("loginEmail").value;
        const pwd = document.getElementById("loginPassword").value;
        try {
            await login(email, pwd);
            window.location.href = "index.html";
        } catch (err) {
            loginMsg.innerText = "Sai email hoặc mật khẩu";
        }
    });
    registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("regEmail").value;
        const pwd = document.getElementById("regPassword").value;
        if (pwd.length < 6) {
            regMsg.innerText = "Mật khẩu phải có ít nhất 6 ký tự";
            return;
        }
        try {
            await register(email, pwd);
            window.location.href = "index.html";
        } catch (err) {
            if (err.code === "auth/email-already-in-use") regMsg.innerText = "Email đã tồn tại";
            else regMsg.innerText = err.message;
        }
    });
    onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = "index.html";
    });
</script>
</body>
</html>
