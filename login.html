<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập / Đăng ký</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container" style="max-width: 450px;">
    <div class="logo" style="text-align:center;">📔 Nhật ký</div>
    <div class="auth-tabs">
        <button id="loginTab" class="tab-btn active">Đăng nhập</button>
        <button id="registerTab" class="tab-btn">Đăng ký</button>
    </div>
    <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Mật khẩu" required>
        <button type="submit">Đăng nhập</button>
        <div id="loginMsg" class="message"></div>
    </form>
    <form id="registerForm" style="display:none;">
        <input type="email" id="regEmail" placeholder="Email" required>
        <input type="password" id="regPassword" placeholder="Mật khẩu (>=6 ký tự)" required>
        <button type="submit">Tạo tài khoản</button>
        <div id="regMsg" class="message"></div>
    </form>
</div>
<script type="module" src="./js/login.js"></script>
</body>
</html>
