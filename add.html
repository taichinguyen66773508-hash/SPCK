<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm nhật ký mới</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">📝 Viết nhật ký mới</div>
        <div class="nav">
            <a href="index.html">🏠 Trang chủ</a>
            <a href="add.html" class="btn-primary">➕ Thêm mới</a>
            <button id="logoutBtn">🚪 Đăng xuất</button>
        </div>
    </div>
    <form id="addForm">
        <div class="form-group">
            <label>📅 Ngày (tự động)</label>
            <input type="text" id="dateInput" readonly style="background:#f5f0ea;">
        </div>
        <div class="form-group">
            <label>😊 Cảm xúc</label>
            <select id="emotionSelect" required>
                <option value="vui">😊 Vui vẻ</option>
                <option value="buồn">😢 Buồn</option>
                <option value="bình thường">😐 Bình thường</option>
                <option value="yêu">❤️ Yêu thương</option>
                <option value="phấn khích">🤩 Phấn khích</option>
                <option value="tức giận">😠 Tức giận</option>
            </select>
        </div>
        <div class="form-group">
            <label>📄 Nội dung</label>
            <textarea id="contentInput" rows="5" placeholder="Hôm nay thế nào?..." required></textarea>
        </div>
        <button type="submit">💾 Lưu nhật ký</button>
        <div id="addMsg" class="message"></div>
    </form>
</div>
<script type="module">
    import { requireAuth, getCurrentUser, logout } from "./js/auth.js";
    import { addDiary } from "./js/diary.js";
    requireAuth();
    document.getElementById("logoutBtn").onclick = logout;
    const dateInput = document.getElementById("dateInput");
    const emotionSelect = document.getElementById("emotionSelect");
    const contentInput = document.getElementById("contentInput");
    const addMsg = document.getElementById("addMsg");
    function getToday() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    dateInput.value = getToday();
    document.getElementById("addForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const user = await getCurrentUser();
        if (!user) return;
        const content = contentInput.value.trim();
        if (!content) {
            addMsg.innerText = "Vui lòng nhập nội dung nhật ký";
            return;
        }
        try {
            await addDiary(user.uid, dateInput.value, emotionSelect.value, content);
            addMsg.style.color = "green";
            addMsg.innerText = "✅ Đã lưu nhật ký! Chuyển về trang chủ...";
            setTimeout(() => { window.location.href = "index.html"; }, 1200);
        } catch (err) {
            addMsg.innerText = "Lỗi: " + err.message;
        }
    });
</script>
</body>
</html>
