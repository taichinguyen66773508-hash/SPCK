<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm nhật ký</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">📝 Viết nhật ký mới</div>
        <div class="nav">
            <a href="index.html">🏠 Trang chủ</a>
            <button id="logoutBtn">🚪 Đăng xuất</button>
        </div>
    </div>
    <form id="addForm">
        <div class="form-group">
            <label>📅 Ngày (tự động)</label>
            <input type="text" id="dateInput" readonly>
        </div>
        <div class="form-group">
            <label>😊 Cảm xúc</label>
            <select id="emotionSelect">
                <option value="vui">😊 Vui vẻ</option>
                <option value="buồn">😢 Buồn</option>
                <option value="bình thường">😐 Bình thường</option>
                <option value="yêu">❤️ Yêu thương</option>
                <option value="phấn khích">🤩 Phấn khích</option>
                <option value="tức giận">😠 Tức giận</option>
            </select>
        </div>
        <div class="form-group">
            <label>📄 Nội dung</label>
            <textarea id="contentInput" rows="5" required></textarea>
        </div>
        <button type="submit">💾 Lưu nhật ký</button>
        <div id="addMsg" class="message"></div>
    </form>
</div>
<script type="module" src="./js/add.js"></script>
</body>
</html>
