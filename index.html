<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhật ký - Trang chủ</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">📔 Nhật ký của tôi</div>
        <div class="nav">
            <a href="index.html" class="btn-primary">🏠 Trang chủ</a>
            <a href="add.html">✍️ Thêm nhật ký</a>
            <span id="userEmail"></span>
            <button id="darkModeBtn">🌙 Dark</button>
            <button id="logoutBtn">🚪 Đăng xuất</button>
        </div>
    </div>
    <div class="welcome-section">
        <div class="welcome-text">
            <h2 id="greeting">Chào bạn!</h2>
            <p id="diaryCountMsg"></p>
        </div>
        <div class="stats" id="statsBadge">📊</div>
    </div>
    <div class="filter-bar">
        <button class="filter-btn active" data-emotion="all">📋 Tất cả</button>
        <button class="filter-btn" data-emotion="vui">😊 Vui</button>
        <button class="filter-btn" data-emotion="buồn">😢 Buồn</button>
        <button class="filter-btn" data-emotion="bình thường">😐 Bình thường</button>
        <button class="filter-btn" data-emotion="yêu">❤️ Yêu</button>
        <button class="filter-btn" data-emotion="phấn khích">🤩 Phấn khích</button>
        <button class="filter-btn" data-emotion="tức giận">😠 Tức giận</button>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm...">
            <button id="searchBtn">Tìm</button>
        </div>
    </div>
    <div id="entriesList"></div>
</div>

<script>
    const darkBtn = document.getElementById('darkModeBtn');
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
    updateBtn();

    darkBtn.onclick = () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateBtn();
    };

    function updateBtn() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        darkBtn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
    }
</script>

<script type="module" src="./js/index.js"></script>
</body>
</html>
